name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11"]
    env:
      DOCKER_HOST: ${{ runner.os == 'Windows' && 'npipe:////./pipe/docker_engine' || '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Configure uv on Windows
        if: runner.os == 'Windows'
        run: |
          uv venv
          echo ".venv\Scripts" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Configure uv on Linux/macOS
        if: runner.os != 'Windows'
        run: |
          uv venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
        shell: bash

      - name: Install dependencies
        # The 'postgres' extra is required for integration tests
        run: uv pip install -e .[dev,postgres]

      - name: Run linter
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

      - name: Run static type checker
        run: mypy .

      - name: Run tests
        run: pytest

  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: gowthamrao/py-load-clinicaltrialsgov
          tags: |
            type=ref,event=branch
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
