name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-ubuntu:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Configure uv
        run: |
          uv venv
          echo ".venv/bin" >> $GITHUB_PATH

      - name: Install dependencies
        # The 'postgres' extra is required for integration tests
        run: uv pip install -e .[dev,postgres]

      - name: Run linter
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

      - name: Run static type checker
        run: mypy .

      - name: Run tests
        run: pytest

  test-macos:
    runs-on: macos-latest
    needs: test-ubuntu
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Configure uv
        run: |
          uv venv
          echo ".venv/bin" >> $GITHUB_PATH

      - name: Start Docker
        run: |
          open -bg /Applications/Docker.app
          # Wait for Docker to start
          for i in {1..60}; do
            if docker info &>/dev/null; then
              break
            fi
            echo "Waiting for Docker to start... ($i)"
            sleep 1
          done
          docker info

      - name: Install dependencies
        # The 'postgres' extra is required for integration tests
        run: uv pip install -e .[dev,postgres]

      - name: Run linter
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

      - name: Run static type checker
        run: mypy .

      - name: Run tests
        run: pytest

  test-windows:
    runs-on: windows-latest
    needs: test-macos
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Configure uv
        shell: pwsh
        run: |
          uv venv
          echo ".venv\Scripts" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Start Docker
        shell: pwsh
        run: |
          Start-Process -FilePath "C:\Program Files\Docker\Docker\Docker Desktop.exe" -PassThru
          Start-Sleep -s 30
          $max_retries = 10
          for ($i=0; $i -lt $max_retries; $i++) {
            try {
              docker info
              if ($LASTEXITCODE -eq 0) {
                Write-Host "Docker started successfully."
                return
              }
            }
            catch {
              Write-Host "Waiting for Docker to start..."
              Start-Sleep -s 10
            }
          }
          Write-Error "Docker did not start within the allotted time."
          exit 1

      - name: Install dependencies
        # The 'postgres' extra is required for integration tests
        run: uv pip install -e .[dev,postgres]

      - name: Run linter
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

      - name: Run static type checker
        run: mypy .

      - name: Run tests
        run: pytest

  build-and-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    needs: test-windows
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: gowthamrao/py-load-clinicaltrialsgov
          tags: |
            type=ref,event=branch
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
